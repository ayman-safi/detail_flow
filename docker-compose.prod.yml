services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    volumes:
      - detailflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - detailflow

  api:
    image: "${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY to ghcr.io/owner/repo}-api:${IMAGE_TAG:-latest}"
    restart: unless-stopped
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      DATA_PROTECTION_KEYS_PATH: /var/lib/detailflow/data-protection-keys
    volumes:
      - detailflow_dataprotection:/var/lib/detailflow/data-protection-keys
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - detailflow

  web:
    image: "${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY to ghcr.io/owner/repo}-web:${IMAGE_TAG:-latest}"
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - api
    networks:
      - detailflow

  migrator:
    image: "${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY to ghcr.io/owner/repo}-api:${IMAGE_TAG:-latest}"
    profiles: ["tools"]
    env_file: .env
    entrypoint: ["/app/efbundle"]
    command: ["--connection", "${DB_CONNECTION_STRING:?Set DB_CONNECTION_STRING in .env}"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - detailflow

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SITE_HOST: ${SITE_HOST:?Set SITE_HOST in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    networks:
      - detailflow

volumes:
  detailflow_pgdata:
  detailflow_dataprotection:
  caddy_data:
  caddy_config:

networks:
  detailflow:
    driver: bridge
