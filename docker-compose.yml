name: detailflow-local

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    env_file:
      - path: .env
        required: false
    volumes:
      - detailflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: DetailFlow.Api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      DATA_PROTECTION_KEYS_PATH: /var/lib/detailflow/data-protection-keys
      TRUSTED_PROXY_CIDRS: 172.30.20.10/32
    volumes:
      - detailflow_dataprotection:/var/lib/detailflow/data-protection-keys
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - frontend

  web:
    build:
      context: ./detailflow-web
      args:
        NEXT_PUBLIC_API_URL: /api
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend

  migrator:
    build:
      context: .
      dockerfile: DetailFlow.Api/Dockerfile
    profiles: ["tools"]
    env_file:
      - path: .env
        required: false
    entrypoint: ["/app/efbundle"]
    command: ["--connection", "${DB_CONNECTION_STRING:?Set DB_CONNECTION_STRING in .env}"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  gateway:
    image: caddy:2-alpine
    ports:
      - "80:8080"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      frontend:
        ipv4_address: 172.30.20.10

volumes:
  detailflow_pgdata:
  detailflow_dataprotection:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.20.0/24
