name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  VPS_APP_DIR: ${{ vars.VPS_APP_DIR || '/home/deploy/app' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET
        run: dotnet restore DetailFlow.sln

      - name: Test .NET
        run: dotnet test DetailFlow.sln --configuration Release --no-restore --verbosity normal

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: detailflow-web/package-lock.json

      - name: Install web dependencies
        working-directory: detailflow-web
        run: npm ci

      - name: Lint web
        working-directory: detailflow-web
        run: npm run lint

      - name: Build web
        working-directory: detailflow-web
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./DetailFlow.Api
            dockerfile: ./DetailFlow.Api/Dockerfile
          - service: web
            context: ./detailflow-web
            dockerfile: ./detailflow-web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image repository
        id: image
        run: echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image repository
        id: image
        run: echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Ensure VPS app directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            mkdir -p "${{ env.VPS_APP_DIR }}/deploy"

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "docker-compose.prod.yml,deploy/Caddyfile,.env.example"
          target: ${{ env.VPS_APP_DIR }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ env.VPS_APP_DIR }}"

            if [ ! -f .env ]; then
              echo "Missing $PWD/.env. Create it from .env.example with production values before deploying."
              exit 1
            fi

            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            export IMAGE_REPOSITORY="${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}"
            export IMAGE_TAG="sha-${{ github.sha }}"

            docker compose -f docker-compose.prod.yml pull postgres caddy api web
            docker compose -f docker-compose.prod.yml up -d postgres
            docker compose -f docker-compose.prod.yml run --rm migrator
            docker compose -f docker-compose.prod.yml up -d --remove-orphans api web caddy
            docker image prune -f
